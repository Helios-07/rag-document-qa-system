name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      # Login to Docker Hub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build API image
      - name: Build API Image
        run: docker build -t helios07/rag-api -f docker/Dockerfile.api .

      # Build UI image
      - name: Build UI Image
        run: docker build -t helios07/rag-ui -f docker/Dockerfile.ui .

      # Push images
      - name: Push Images
        run: |
          docker push helios07/rag-api
          docker push helios07/rag-ui

      # SSH into EC2 and deploy
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/rag-document-qa-system
            docker-compose down
            docker-compose pull
            docker-compose up -d --remove-orphans